[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[edge_functions]]
  path = "/api/claude"
  function = "edge"

[[edge_functions]]
  path = "/api/lock-wip"
  function = "edge"

[[redirects]]
  from = "/api/generate-pdf"
  to = "/.netlify/functions/generate-pdf"
  status = 200
  force = true

# Scheduled WIP lockdown - every Saturday at midnight ET (05:00 UTC)
[[scheduled_functions]]
  function = "lock-wip"
  cron = "0 5 * * 6"
