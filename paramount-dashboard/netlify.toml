[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[edge_functions]]
  path = "/api/claude"
  function = "claude"

[[edge_functions]]
  path = "/api/lock-wip"
  function = "lock-wip"

[[edge_functions]]
  path = "/api/generate-pdf"
  function = "generate-pdf"

[[edge_functions]]
  path = "/api/slack"
  function = "slack"

[[edge_functions]]
  path = "/api/slack-sync"
  function = "slack-sync"

[[edge_functions]]
  path = "/api/slack-upload"
  function = "slack-upload"

[[edge_functions]]
  path = "/api/slack-users"
  function = "slack-users"

# Scheduled WIP lockdown - every Saturday at midnight ET (05:00 UTC)
[[scheduled_functions]]
  function = "lock-wip"
  cron = "0 5 * * 6"
